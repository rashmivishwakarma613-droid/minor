<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Analysis - AI-EDU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); }
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
    </style>
</head>
<body class="min-h-screen p-4 pb-10">

    <div class="max-w-3xl mx-auto mb-8">
        <button onclick="window.history.back()" class="text-blue-400 mb-4">
            ← Back
        </button>
        <h1 id="page-title" class="text-3xl font-bold">Subject Analysis</h1>
        <p id="page-subtitle" class="text-gray-400 mt-2 text-sm">Loading...</p>
    </div>

    <div id="questions-list" class="max-w-3xl mx-auto space-y-6"></div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const subject = urlParams.get('subject');
const unit = urlParams.get('unit');

if(subject && unit) {
    document.getElementById('page-title').innerText = subject + " - " + unit;
    fetchQuestions();
}

function fetchQuestions() {
    const container = document.getElementById('questions-list');
    container.innerHTML = "Loading...";

    fetch(`/api/questions/${encodeURIComponent(subject)}/${encodeURIComponent(unit)}`)
        .then(res => res.json())
        .then(data => {
            container.innerHTML = '';

            if(data.length === 0) {
                container.innerHTML = "No questions found";
                return;
            }

            data.forEach((item, index) => {
                container.innerHTML += `
                <div class="glass p-6 rounded-2xl space-y-3">

                    <h3 class="font-bold">${index+1}. ${item.q}</h3>

                    <p>Repeats: ${item.repeats}</p>
                    <p>Probability: ${item.prob}</p>

                    <p>${item.ans}</p>

                    <!-- ✅ NEW BUTTONS -->
                    <div class="flex gap-3 mt-3">

                        <button onclick="deleteQ(${item.id})"
                            class="bg-red-600 px-3 py-1 rounded text-xs">
                            Delete
                        </button>

                        <button onclick="editQ(${item.id}, \`${item.q}\`, \`${item.ans}\`)"
                            class="bg-yellow-500 px-3 py-1 rounded text-xs">
                            Edit
                        </button>

                    </div>

                </div>
                `;
            });

            document.getElementById('page-subtitle').innerText =
                `Total ${data.length} questions`;
        });
}

function deleteQ(id) {
    fetch(`/delete-question/${id}`)
        .then(() => {
            alert("Deleted!");
            location.reload();
        });
}

function editQ(id, oldQ, oldAns) {
    let newQ = prompt("Edit Question:", oldQ);
    let newAns = prompt("Edit Answer:", oldAns);

    fetch(`/update-question/${id}`, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: `question=${encodeURIComponent(newQ)}&answer=${encodeURIComponent(newAns)}`
    }).then(() => {
        alert("Updated!");
        location.reload();
    });
}
</script>

</body>
</html>
