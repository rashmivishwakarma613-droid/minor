<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-white flex items-center justify-center min-h-screen p-4">
    <div class="bg-white/5 p-8 rounded-3xl border border-white/10 w-full max-w-sm backdrop-blur-md">
        <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>
        <form action="/register" method="POST" class="space-y-4">
            <input type="text" name="name" placeholder="Full Name" required class="w-full p-3 rounded-xl bg-white/5 border border-white/10 outline-none">
            <input type="email" name="email" placeholder="Email" required class="w-full p-3 rounded-xl bg-white/5 border border-white/10 outline-none">
            <input type="password" name="password" placeholder="Password" required class="w-full p-3 rounded-xl bg-white/5 border border-white/10 outline-none">
            <button type="submit" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Sign Up</button>
        </form>
        <p class="mt-4 text-center text-sm text-gray-400">Already have an account? <a href="/" class="text-blue-400">Login</a></p>
    </div>
</body>
</html>
