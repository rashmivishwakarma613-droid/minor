<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }} PYQ Papers</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body{
            background:#0f172a;
            font-family: Arial, sans-serif;
        }
    </style>
</head>

<body class="min-h-screen text-white p-4">

    <div class="max-w-2xl mx-auto">
      <!-- Back Button -->
<div class="mb-4">

    <button onclick="history.back()"

    class="bg-slate-800 hover:bg-slate-700
    border border-slate-600
    px-4 py-2 rounded-xl
    text-sm font-bold transition">

        ← Back

    </button>

</div>
        <!-- Heading -->
        <div class="mb-6 text-center">

            <h1 class="text-3xl font-bold text-blue-400">
                {{ subject }}
            </h1>

            <p class="text-gray-400 mt-2">
                Previous Year Question Papers
            </p>

        </div>

        <!-- PDF List -->
        <div class="space-y-4">

            {% for pdf in pdf_files %}

            <div class="bg-slate-800 border border-slate-700 rounded-2xl p-4 flex items-center justify-between shadow-lg">

                <!-- PDF Name -->
                <div class="flex items-center gap-3 overflow-hidden">

                    <div class="text-3xl">
                        📄
                    </div>

                    <p class="font-semibold truncate">
                        {{ pdf }}
                    </p>

                </div>

                <!-- Open Button -->
                <a href="{{ url_for('static',
                filename='papers/' + subject.replace(' ', '_') + '/' + pdf) }}"
                target="_blank"
                rel="noopener noreferrer"

                class="bg-blue-500 hover:bg-blue-600
                px-4 py-2 rounded-xl text-sm font-bold transition">

                    Open

                </a>

            </div>

            {% endfor %}

        </div>

        <!-- Empty State -->
        {% if not pdf_files %}

        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 text-center mt-6">

            <div class="text-5xl mb-4">
                📚
            </div>

            <h2 class="text-xl font-bold">
                No PDFs Found
            </h2>

            <p class="text-gray-400 mt-2 text-sm">
                PDFs are not uploaded yet.
            </p>

        </div>

        {% endif %}

    </div>

</body>
</html>
