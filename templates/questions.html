<!DOCTYPE html>
<html>
<head>
    <title>Questions</title>
</head>
<body>

<h1>All Questions</h1>

{% for q in questions %}

<div style="border:1px solid gray; padding:10px; margin:10px;">

    <h3>{{ q.question }}</h3>

    <p>
        Year: {{ q.year }} |
        Semester: {{ q.semester }} |
        Subject: {{ q.subject }} |
        Unit: {{ q.unit }}
    </p>

</div>

{% endfor %}

</body>
</html>
</body>
</html>
