<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-EDU Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(12px); }
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .hidden { display: none; }
    </style>
</head>

<body class="min-h-screen p-4 pb-20">

    <!-- ✅ NAVBAR -->
    <nav class="flex justify-between items-center p-4 glass rounded-2xl mb-8">
        <h1 class="text-xl font-bold text-blue-400">AI-EDU HUB</h1>

        <div class="flex gap-3">
            <!-- ✅ ADD QUESTION BUTTON -->
            <a href="/add-question">
                <button class="bg-green-600 px-4 py-1.5 rounded-full text-xs font-semibold">
                    + Add Question
                </button>
            </a>

            <!-- Language Button -->
            <button id="langBtn" onclick="toggleLanguage()" class="bg-blue-600 px-4 py-1.5 rounded-full text-xs font-semibold">
                Hindi / English
            </button>
        </div>
    </nav>

    <!-- YEAR SCREEN -->
    <div id="year-screen" class="max-w-md mx-auto space-y-6">
        <h2 class="text-2xl font-bold text-center">Select Your Year</h2>
        <div class="grid gap-4">
            <button onclick="showSemesters(1)" class="p-6 glass rounded-2xl text-xl font-bold">1st Year</button>
            <button onclick="showSemesters(2)" class="p-6 glass rounded-2xl text-xl font-bold">2nd Year</button>
            <button onclick="showSemesters(3)" class="p-6 glass rounded-2xl text-xl font-bold">3rd Year</button>
            <button onclick="showSemesters(4)" class="p-6 glass rounded-2xl text-xl font-bold">4th Year</button>
        </div>
    </div>

    <!-- SEM SCREEN -->
    <div id="sem-screen" class="hidden max-w-md mx-auto space-y-6">
        <button onclick="switchScreen('year-screen')" class="text-blue-400">← Back</button>
        <h2 class="text-2xl font-bold text-center">Select Semester</h2>
        <div id="sem-buttons" class="grid gap-4"></div>
    </div>

    <!-- SUBJECT SCREEN -->
    <div id="subject-screen" class="hidden max-w-md mx-auto space-y-6">
        <button onclick="switchScreen('sem-screen')" class="text-blue-400">← Back</button>
        <h2 class="text-2xl font-bold text-center">Subjects</h2>
        <div id="subject-list" class="grid gap-3"></div>
    </div>

    <!-- UNIT SCREEN -->
    <div id="unit-screen" class="hidden max-w-md mx-auto space-y-6">
        <button onclick="switchScreen('subject-screen')" class="text-blue-400">← Back</button>
        <h2 id="unit-title-text" class="text-2xl font-bold text-center">Units</h2>
        <div id="unit-list" class="grid gap-4"></div>
    </div>

<script>
function switchScreen(id) {
    ['year-screen', 'sem-screen', 'subject-screen', 'unit-screen'].forEach(s => {
        document.getElementById(s).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
}

function showSemesters(year) {
    const container = document.getElementById('sem-buttons');
    container.innerHTML = '';

    let sems = [year * 2 - 1, year * 2];

    sems.forEach(num => {
        const btn = document.createElement('button');
        btn.className = "p-6 glass rounded-2xl text-xl font-bold";
        btn.innerText = "Semester " + num;
        btn.onclick = () => fetchSubjects(num);
        container.appendChild(btn);
    });

    switchScreen('sem-screen');
}

function fetchSubjects(semNum) {
    const list = document.getElementById('subject-list');
    list.innerHTML = "Loading...";

    fetch("/api/subjects/Semester " + semNum)
        .then(res => res.json())
        .then(data => {
            list.innerHTML = '';
            data.forEach(sub => {
                const b = document.createElement('button');
                b.className = "p-5 glass rounded-xl text-left font-bold";
                b.innerText = sub;
                b.onclick = () => fetchUnits(sub);
                list.appendChild(b);
            });
            switchScreen('subject-screen');
        });
}

function fetchUnits(subjectName) {
    const list = document.getElementById('unit-list');
    list.innerHTML = "Loading...";

    fetch("/api/units/" + subjectName)
        .then(res => res.json())
        .then(units => {
            list.innerHTML = '';

            units.forEach(unit => {
                const btn = document.createElement('button');
                btn.className = "p-5 glass rounded-2xl";

                btn.innerText = unit;

                btn.onclick = () => {
                    window.location.href = `/analysis?subject=${encodeURIComponent(subjectName)}&unit=${encodeURIComponent(unit)}`;
                };

                list.appendChild(btn);
            });

            switchScreen('unit-screen');
        });
}
</script>


</body>
</html>
