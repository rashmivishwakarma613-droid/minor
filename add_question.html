<!DOCTYPE html>
<html>
<head>
    <title>Add Question</title>
</head>
<body>

<h2>Add New Question</h2>

<form action="/add-question" method="POST">

    <input type="text" name="subject" placeholder="Subject"><br><br>

    <input type="text" name="unit" placeholder="Unit (e.g. Unit 1)"><br><br>

    <textarea name="question" placeholder="Enter Question"></textarea><br><br>

    <input type="text" name="repeats" placeholder="Years (e.g. 2021, 2023)"><br><br>

    <input type="text" name="probability" placeholder="Probability (e.g. 90%)"><br><br>

    <textarea name="answer" placeholder="Answer"></textarea><br><br>

    <button type="submit">Add Question</button>

</form>

</body>
</html>
